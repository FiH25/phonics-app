<script>
const DATA = {
  "igh": ["night", "light", "high"],
  "oa": ["boat", "road", "soap"],
  "ee": ["tree", "feet", "green"],
  "sh": ["ship", "shop", "fish"],
  "ch": ["chip", "chat", "much"],
  "ar": ["car", "star", "farm"],
  "ur": ["turn", "burn", "curl"]
};

let sounds = Object.keys(DATA);
let answerSound;
let score = 0;
let total = 0;

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function newRound() {
  answerSound = sounds[Math.floor(Math.random() * sounds.length)];

  const correctWord =
    DATA[answerSound][Math.floor(Math.random() * DATA[answerSound].length)];

  const wrongSounds = shuffle(sounds.filter(s => s !== answerSound)).slice(0,2);

  const wrongWords = wrongSounds.map(s =>
    DATA[s][Math.floor(Math.random() * DATA[s].length)]
  );

  const choices = shuffle([correctWord, ...wrongWords]);

  const grid = document.getElementById("options");
  grid.innerHTML = "";

  choices.forEach(word => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerText = word;
    btn.onclick = () => pick(word, correctWord);
    grid.appendChild(btn);
  });

  document.getElementById("message").innerText =
    "Tap play, then choose the word with the sound.";
}

function playSound() {
  const audio = new Audio("audio/" + answerSound + ".mp3");
  audio.play().catch(() => {
    alert("Missing audio for: " + answerSound);
  });
}

function pick(choice, correctWord) {
  total++;

  if (choice === correctWord) {
    score++;
    document.getElementById("message").innerText = "✅ Yes! That word has the sound.";
  } else {
    document.getElementById("message").innerText =
      "❌ The sound was in: " + correctWord;
  }

  document.getElementById("score").innerText =
    "Score: " + score + " / " + total;

  setTimeout(newRound, 1500);
}

newRound();
</script>
