<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="utf-8" />
  <title>Find the Sound</title>

  <style>
    :root {
      --bg1: #fdf2f8;
      --bg2: #eef6ff;
      --card: rgba(255,255,255,0.92);
      --text: #1f2937;
      --muted: #64748b;
      --blue: #38bdf8;
      --blue-dark: #0284c7;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #fde68a;
      --purple: #c084fc;
      --border: #dbeafe;
      --shadow: 0 12px 35px rgba(31, 41, 55, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffe4f1 0%, transparent 30%),
        radial-gradient(circle at top right, #dbeafe 0%, transparent 32%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    .app-shell {
      width: 100%;
      max-width: 560px;
      position: relative;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.7);
      overflow: hidden;
      position: relative;
    }

    .top-bar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .score-pill {
      background: linear-gradient(135deg, #ffffff, #f8fbff);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px 14px;
      min-width: 120px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(2, 132, 199, 0.08);
    }

    .score-pill .small {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .score-pill .big {
      font-weight: 800;
      font-size: 1rem;
      line-height: 1.2;
    }

    .play-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      font: inherit;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease, background 0.14s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(0.98);
    }

    .play {
      flex: 1;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: white;
      font-weight: 800;
      font-size: 1.05rem;
      padding: 16px 18px;
      box-shadow: 0 10px 20px rgba(2, 132, 199, 0.24);
    }

    .play:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .secondary {
      background: white;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 16px 14px;
      font-weight: 700;
      min-width: 68px;
    }

    .message {
      position: relative;
      background: linear-gradient(135deg, #ffffff, #f8fbff);
      border: 1px solid var(--border);
      padding: 14px 16px;
      border-radius: 18px;
      min-height: 56px;
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      color: var(--text);
      box-shadow: 0 6px 18px rgba(2, 132, 199, 0.06);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .option {
      background: white;
      border: 2px solid #e5eefb;
      border-radius: 22px;
      padding: 18px 16px;
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text);
      min-height: 82px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
    }

    .option:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
    }

    .option.correct {
      border: 3px solid var(--green) !important;
      background: linear-gradient(135deg, #ffffff, #f0fdf4);
    }

    .option.wrong {
      border: 3px solid var(--red) !important;
      background: linear-gradient(135deg, #ffffff, #fef2f2);
    }

    .hl {
      background: var(--yellow);
      border-radius: 10px;
      padding: 0 5px;
      box-shadow: inset 0 -2px 0 rgba(255,255,255,0.35);
      animation: pulseGlow 0.7s ease 2;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(253, 224, 71, 0.0); }
      50% { box-shadow: 0 0 0 8px rgba(253, 224, 71, 0.2); }
      100% { box-shadow: 0 0 0 0 rgba(253, 224, 71, 0.0); }
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
    }

    /* Tiny firework delight */
    #sparkle-layer {
      pointer-events: none;
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 9000;
    }

    .spark {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      opacity: 0;
      animation: burst 700ms ease-out forwards;
    }

    @keyframes burst {
      0% {
        transform: translate(0, 0) scale(0.2);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(1.2);
        opacity: 0;
      }
    }

    /* Donkey overlay */
    #celebration {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.62);
      z-index: 9999;
      padding: 20px;
    }

    .celebrate-card {
      width: min(520px, 94vw);
      background: white;
      border-radius: 26px;
      padding: 20px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.28);
      text-align: center;
    }

    .celebrate-card h2 {
      margin: 0;
      font-size: 1.7rem;
    }

    .stars {
      font-size: 1.25rem;
      margin-top: 8px;
      animation: pop 0.9s ease-in-out infinite;
    }

    .donkey-stage {
      position: relative;
      height: 130px;
      overflow: hidden;
      border-radius: 18px;
      background: linear-gradient(180deg, #dbeafe, #fef9c3);
      border: 1px solid #dbeafe;
      margin-top: 14px;
    }

    .donkey {
      position: absolute;
      left: -18%;
      top: 44px;
      font-size: 60px;
      animation: moonwalk 1.8s ease-in-out infinite;
      transform: scaleX(-1);
    }

    @keyframes moonwalk {
      0%   { transform: translateX(0) scaleX(-1) rotate(0deg); }
      50%  { transform: translateX(145%) scaleX(-1) rotate(-6deg); }
      100% { transform: translateX(290%) scaleX(-1) rotate(0deg); }
    }

    @keyframes pop {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    @media (min-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="sparkle-layer"></div>

  <div id="celebration" onclick="hideCelebration()">
    <div class="celebrate-card">
      <h2>5 in a row! 🎉</h2>
      <div class="stars">✨ Donkey moonwalk! 🌙 ✨</div>
      <div class="donkey-stage">
        <div class="donkey">🫏</div>
      </div>
      <p style="margin:12px 0 0; color:#64748b; font-size:14px;">
        Tap anywhere to continue.
      </p>
    </div>
  </div>

  <div class="app-shell">
    <div class="card">
      <div class="top-bar">
        <div class="title-wrap">
          <h1>Find the sound in the word</h1>
          <div class="subtitle">Listen carefully, then tap the word with the matching sound.</div>
        </div>
        <div class="score-pill">
          <span class="small">Score • streak</span>
          <span class="big" id="score">0 / 0 • 0</span>
        </div>
      </div>

      <div class="play-row">
        <button id="playBtn" class="play" onclick="playSound()">▶ Play sound</button>
        <button class="secondary" onclick="newRound()">↻</button>
      </div>

      <div class="message" id="message">Tap play, then choose the word with the sound.</div>

      <div class="grid" id="options"></div>

      <div class="footer-note">Great spotting helps reading grow.</div>
    </div>
  </div>

  <script>
    const DATA = {
      "igh": ["night", "light", "high", "sight", "tight", "right", "bright"],
      "oa":  ["boat", "road", "soap", "goat", "coat", "toad", "float"],
      "ee":  ["tree", "feet", "green", "see", "week", "sleep", "sheep", "seed"],
      "sh":  ["ship", "shop", "fish", "dish", "shell", "cash", "brush", "shed"],
      "ch":  ["chip", "chat", "much", "chin", "chop", "lunch", "chick", "bench"],
      "ar":  ["car", "star", "farm", "park", "hard", "yard", "shark", "start"],
      "ur":  ["turn", "burn", "curl", "hurt", "fur", "surf", "church", "burst"]
    };

    const sounds = Object.keys(DATA);

    let currentAudio = null;
    let answerSound;
    let correctWord;
    let score = 0;
    let total = 0;
    let streak = 0;
    let locked = false;
    let lastCelebratedMultiple = 0;

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function escapeHtml(s) {
      return s
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function highlightGrapheme(word, grapheme) {
      const safe = escapeHtml(word);
      const re = new RegExp(grapheme.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
      return safe.replace(re, (m) => `<span class="hl">${m}</span>`);
    }

    function setMessage(text) {
      document.getElementById("message").innerText = text;
    }

    function setScore() {
      document.getElementById("score").innerText = `${score} / ${total} • ${streak}`;
    }

    function stopAnyAudio() {
      if (!currentAudio) return;
      try {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      } catch (e) {}
      currentAudio = null;
    }

    function setPlayBusy(isBusy) {
      const btn = document.getElementById("playBtn");
      if (!btn) return;
      btn.disabled = isBusy;
      btn.textContent = isBusy ? "⏳ Loading..." : "▶ Play sound";
    }

    function showCelebration() {
      document.getElementById("celebration").style.display = "flex";
    }

    function hideCelebration() {
      document.getElementById("celebration").style.display = "none";
      newRound();
    }

    window.hideCelebration = hideCelebration;

    function launchSparkles() {
      const layer = document.getElementById("sparkle-layer");
      const colours = ["#f59e0b", "#ef4444", "#22c55e", "#38bdf8", "#c084fc", "#fb7185"];
      const centreX = window.innerWidth / 2;
      const centreY = window.innerHeight * 0.26;

      for (let i = 0; i < 18; i++) {
        const spark = document.createElement("div");
        spark.className = "spark";
        spark.style.left = `${centreX}px`;
        spark.style.top = `${centreY}px`;
        spark.style.background = colours[i % colours.length];
        spark.style.setProperty("--dx", `${(Math.random() - 0.5) * 220}px`);
        spark.style.setProperty("--dy", `${(Math.random() - 0.5) * 180}px`);
        layer.appendChild(spark);

        setTimeout(() => {
          spark.remove();
        }, 750);
      }
    }

    function newRound() {
      locked = false;
      stopAnyAudio();
      setPlayBusy(false);

      answerSound = sounds[Math.floor(Math.random() * sounds.length)];
      correctWord = DATA[answerSound][Math.floor(Math.random() * DATA[answerSound].length)];

      const wrongSounds = shuffle(sounds.filter(s => s !== answerSound)).slice(0, 2);
      const wrongWords = wrongSounds.map(sound =>
        DATA[sound][Math.floor(Math.random() * DATA[sound].length)]
      );

      const choices = shuffle([correctWord, ...wrongWords]);

      const grid = document.getElementById("options");
      grid.innerHTML = "";

      choices.forEach(word => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.dataset.word = word;
        btn.innerText = word;
        btn.onclick = () => pick(word);
        grid.appendChild(btn);
      });

      setMessage("Tap play, then choose the word with the sound.");
      setScore();
    }

    function playSound() {
      if (!answerSound) return;

      stopAnyAudio();
      setPlayBusy(true);

      const audio = new Audio(`audio/${answerSound}.mp4`);
      audio.preload = "auto";
      currentAudio = audio;

      audio.addEventListener("ended", () => {
        setPlayBusy(false);
      });

      audio.addEventListener("error", () => {
        setPlayBusy(false);
        setMessage(`No recording found for "${answerSound}" yet.`);
      });

      audio.play()
        .then(() => {
          setPlayBusy(false);
        })
        .catch(() => {
          setPlayBusy(false);
          setMessage("Sound didn’t play that time — tap Play again.");
        });
    }

    function revealHighlights(chosenWord) {
      const buttons = Array.from(document.querySelectorAll("#options .option"));

      buttons.forEach(btn => {
        const w = btn.dataset.word;
        btn.disabled = true;

        if (w === correctWord) {
          btn.classList.add("correct");
          btn.innerHTML = highlightGrapheme(w, answerSound);
        } else if (w === chosenWord && chosenWord !== correctWord) {
          btn.classList.add("wrong");
        }
      });
    }

    function pick(choice) {
      if (locked) return;
      locked = true;

      total++;
      const isCorrect = choice === correctWord;

      if (isCorrect) {
        score++;
        streak++;
        setMessage("✅ Yes! That word has the sound.");
        launchSparkles();
        if (navigator.vibrate) navigator.vibrate([25]);
      } else {
        streak = 0;
        setMessage("❌ Not that one — look for the highlighted sound.");
        if (navigator.vibrate) navigator.vibrate([90, 50, 90]);
      }

      revealHighlights(choice);
      setScore();

      const currentMultiple = Math.floor(streak / 5) * 5;
      const shouldCelebrate =
        isCorrect &&
        streak > 0 &&
        streak % 5 === 0 &&
        currentMultiple > lastCelebratedMultiple;

      if (shouldCelebrate) {
        lastCelebratedMultiple = currentMultiple;
        setTimeout(() => showCelebration(), 750);
        return;
      }

      setTimeout(newRound, 1500);
    }

    newRound();
  </script>
</body>
</html>
